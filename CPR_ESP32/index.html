<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couch Potato Remotes</title>

<style>
    :root {
        --bg: #f4f6f9;
        --card-bg: #ffffff;
        --primary: #2563eb;
        --primary-hover: #1e4ed8;
        --text: #1f2937;
        --border: #e5e7eb;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
    }

    .container {
        width: 100%;
        max-width: 900px;
        padding: 20px;
    }

    h1 {
        margin-top: 0;
        text-align: center;
    }

    .card {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 14px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        margin-bottom: 20px;
    }

    .remotes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 15px;
        margin-top: 15px;
    }

    .remote-link {
        display: block;
        padding: 15px;
        text-decoration: none;
        background: var(--primary);
        color: white;
        border-radius: 10px;
        text-align: center;
        font-weight: 500;
        transition: background 0.2s ease, transform 0.1s ease;
    }

    .remote-link:hover {
        background: var(--primary-hover);
        transform: translateY(-2px);
    }

    #received_ir_command {
        font-family: monospace;
        background: #111827;
        color: #10b981;
        padding: 15px;
        border-radius: 8px;
        margin-top: 10px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
    }

    .status-label {
        font-weight: 600;
        margin-bottom: 5px;
    }

    @media (max-width: 480px) {
        .container {
            padding: 15px;
        }

        .card {
            padding: 15px;
        }
    }
</style>
</head>

<body>

<div class="container">

    <h1>CouchPotatoRemotes</h1>

    <div class="card">
        <h2>Available Remotes</h2>
        <div class="remotes-grid">
            <a class="remote-link" href="/remote-xanlite-rgb">
                Xanlite RGB Remote
            </a>
            
            <a class="remote-link" href="/remote-driggs-wc">
                Driggs Warm/Cold Remote
            </a>

            <!-- Future remotes:
            <a class="remote-link" href="/remote-tv">
                TV Remote
            </a>
            -->
        </div>
    </div>

    <div class="card">
        <h2>Last IR Command</h2>
        <div id="received_ir_command">Waiting...</div>
    </div>
</div>

<script>
    const irDisplay = document.getElementById("received_ir_command");
    let lastValue = "";

    function fetchIR() {
        fetch("/recvir")
            .then(response => response.text())
            .then(data => {
                if (data !== lastValue) {
                    irDisplay.textContent = data;
                    lastValue = data;
                }
            })
            .catch(err => {
                irDisplay.textContent = "Error fetching IR data";
            });
    }
    setInterval(fetchIR, 250);
</script>

</body>
</html>
